name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: stub
          PINECONE_API_KEY: stub

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/pinecone-rag
            CURRENT_TAG=$(cat ~/deploys/pinecone-rag/.current-tag 2>/dev/null || echo "none")
            NEW_TAG="${{ github.sha }}"

            git pull origin master
            docker compose build
            docker compose up -d

            sleep 10
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              mkdir -p ~/deploys/pinecone-rag
              echo "$NEW_TAG" > ~/deploys/pinecone-rag/.current-tag
              echo "Deploy successful: $NEW_TAG"
            else
              echo "Health check failed! Rolling back to $CURRENT_TAG"
              if [ "$CURRENT_TAG" != "none" ]; then
                git checkout "$CURRENT_TAG"
                docker compose build
                docker compose up -d
              fi
              exit 1
            fi

            docker image prune -f
